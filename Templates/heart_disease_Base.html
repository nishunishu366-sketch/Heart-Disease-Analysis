
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Disease Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f4f7fb;
color:#333;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 50px;
background:#ffffff;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
color:#e63946;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:#333;
font-weight:500;
transition:0.3s;
}

.nav-links a:hover{
color:#e63946;
}

/* MAIN CONTENT WRAPPER */
.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* FOOTER */
footer{
margin-top:60px;
background:#1d3557;
color:white;
text-align:center;
padding:25px;
font-size:14px;
}

footer span{
color:#a8dadc;
font-weight:600;
}

/* CARD STYLE (new layout feature) */
.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:25px;
}

/* RESPONSIVE */
@media(max-width:768px){

.navbar{
flex-direction:column;
gap:15px;
padding:20px;
}

.nav-links{
gap:18px;
}

.logo{
font-size:20px;
}

}

</style>
</head>

<body>

<nav class="navbar">
<div class="logo">❤️ Heart Disease Analysis</div>
<div class="nav-links">
<a href="/">Home</a>
<a href="/dashboard">Dashboard</a>
<a href="/story">Story</a>
</div>
</nav>

<div class="container">
{% block content %}{% endblock %}
</div>

<footer>
© 2026 <span>Heart Disease Project</span> | KIET Deemed to be University | All rights reserved.
</footer>

</body>
</html>
